<main class="auth-page">
  <section class="auth-card">
    <a routerLink="/login" class="back">Volver a login</a>
    <h1>Recuperar contrasena</h1>
    <p>Te enviaremos instrucciones para restablecer tu acceso.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" formControlName="email" placeholder="correo@dominio.com" />
        <small *ngIf="hasError()">Ingresa un correo valido.</small>
      </label>

      <button type="submit">Enviar instrucciones</button>
    </form>

    <p class="success" *ngIf="sent">Solicitud registrada. Revisa tu correo en unos minutos.</p>
  </section>
</main>
